<section class="carousel">
	<div class="carousel-overlay">
		{% include header.html %}
		<div class="row">
			<div class="column hero-text">
				<p>
					Lil' Debbie's Coyote Grill is permanently closed.
				</p>
			</div>
			<div class="column hero-button">
				<a href="#news" class="button outline accent">News →</a>
			</div>
		</div>
		<div class="site-logo">
			{% include images/logo-no-words.svg %}
		</div>
	</div>
{% for image in site.carousel_images %}
	<img class="carousel-image" src="/images/small/{{ image.src }}" alt=""
		srcset="/images/small/{{ image.src }} {{ site.media.small_mobile }}w, /images/medium/{{ image.src }} {{ site.media.large_desktop }}w, /images/large/{{ image.src }} {{ site.media.very_large_desktop }}w"
		{% if image.position %} style="object-position: {{ image.position }};" {% endif %}/>
{% endfor %}
</section>
